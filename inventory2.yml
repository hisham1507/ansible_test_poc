---

all:
  children:
    zos:
      hosts:
        MF1T:
          ansible_host: 198.212.158.145.ens.nat64
          ansible_port: 922
          #ansible_user: "TOMHH"
          CMDB_Client: "Ensono Shared"
          ansible_ssh_common_args: '-o UserKnownHostsFile=/dev/null'
          ansible_scp_extra_args: -O
          ansible_ssh_transfer_method: scp
          ZOAU: "/usr/local/ensono/zoautil"
          PYZ: "/usr/local/ensono/python"
          ansible_python_interpreter: "{{ PYZ }}/bin/python"
          environment: "{{ environment_vars| default ('')}}"
          environment_vars:
            _BPXK_AUTOCVT: "ON"
            ZOAU_HOME: "{{ ZOAU }}"
            LIBPATH: "{{ ZOAU }}/lib:{{ PYZ }}/lib:/lib:/usr/lib:."
            PATH: "{{ ZOAU }}/bin:{{ PYZ }}/bin:/bin:/usr/sbin:/var/bin"
            _CEE_RUNOPTS: "FILETAG(AUTOCVT,AUTOTAG) POSIX(ON)"
            _TAG_REDIR_ERR: "txt"
            _TAG_REDIR_IN: "txt"
            _TAG_REDIR_OUT: "txt"
            LANG: "C"